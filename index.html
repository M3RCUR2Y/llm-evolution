<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大模型进化史 — LLM Evolution Timeline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #1a2235;
    --bg-hover: #243049;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border: #1e293b;
    --accent: #3b82f6;
    --glow: rgba(59, 130, 246, 0.3);
  }

  body {
    font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ===== Header ===== */
  .header {
    padding: 40px 48px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, var(--bg-primary) 60%, transparent);
    backdrop-filter: blur(12px);
  }

  .header h1 {
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .header p {
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 300;
  }

  /* ===== Stats Bar ===== */
  .stats-bar {
    display: flex;
    gap: 32px;
    padding: 16px 48px;
    border-bottom: 1px solid var(--border);
  }

  .stat {
    display: flex;
    flex-direction: column;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ===== Filters ===== */
  .filters {
    display: flex;
    gap: 12px;
    padding: 20px 48px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    align-self: center;
    margin-right: 8px;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--text-primary);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .filter-separator {
    width: 1px;
    height: 24px;
    background: var(--border);
    align-self: center;
    margin: 0 8px;
  }

  /* ===== Timeline Container ===== */
  .timeline-container {
    padding: 24px 48px 80px;
    overflow-x: auto;
    overflow-y: hidden;
  }

  .timeline-scroll {
    min-width: 100%;
    position: relative;
  }

  /* ===== Year Axis ===== */
  .year-axis {
    display: flex;
    position: relative;
    z-index: 10;
    margin-left: 180px;
    height: 40px;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
  }

  .year-label {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    padding-bottom: 8px;
    min-width: 80px;
    position: absolute;
  }

  .year-label::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 1px;
    height: 8px;
    background: var(--border);
  }

  /* ===== Company Rows ===== */
  .company-row {
    display: flex;
    min-height: 72px;
    border-bottom: 1px solid rgba(30, 41, 59, 0.5);
    transition: background 0.3s;
    position: relative;
  }

  .company-row:hover {
    background: rgba(59, 130, 246, 0.03);
  }

  .company-label {
    width: 180px;
    min-width: 180px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    position: sticky;
    left: 0;
    z-index: 5;
    background: var(--bg-primary);
    border-right: 1px solid var(--border);
  }

  .company-logo {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .company-info {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .company-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .company-origin {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ===== Model Track ===== */
  .model-track {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    padding: 12px 0;
  }

  .year-grid-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(30, 41, 59, 0.4);
  }

  /* ===== Model Node ===== */
  .model-node {
    position: absolute;
    transform: translateX(-50%);
    cursor: pointer;
    z-index: 2;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .model-node:hover {
    z-index: 20;
    transform: translateX(-50%) scale(1.15);
  }

  .model-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid;
    position: relative;
    transition: all 0.3s;
  }

  .model-node:hover .model-dot {
    box-shadow: 0 0 20px var(--glow);
  }

  .model-dot.flagship {
    width: 20px;
    height: 20px;
    border-width: 3px;
  }

  .model-name {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    font-weight: 500;
    white-space: nowrap;
    color: var(--text-secondary);
    transition: color 0.2s;
    pointer-events: none;
  }

  .model-node:hover .model-name {
    color: var(--text-primary);
    font-weight: 600;
  }

  .model-year-tag {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: var(--text-muted);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .model-node:hover .model-year-tag {
    opacity: 1;
  }

  /* ===== Tooltip ===== */
  .tooltip {
    position: fixed;
    z-index: 1000;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    max-width: 360px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }

  .tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .tooltip-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .tooltip-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
  }

  .tooltip-title {
    font-size: 16px;
    font-weight: 700;
  }

  .tooltip-date {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .tooltip-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .tooltip-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .tooltip-tag {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    background: rgba(59, 130, 246, 0.15);
    color: #93c5fd;
    border: 1px solid rgba(59, 130, 246, 0.2);
  }

  /* ===== Legend ===== */
  .legend {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    padding: 10px 24px;
    background: rgba(17, 24, 39, 0.95);
    border: 1px solid var(--border);
    border-radius: 24px;
    backdrop-filter: blur(12px);
    z-index: 50;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid;
  }

  .legend-dot.flagship {
    width: 14px;
    height: 14px;
    border-width: 3px;
  }

  /* ===== Animations ===== */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .company-row {
    animation: fadeIn 0.5s ease-out both;
  }

  .model-node {
    animation: fadeIn 0.4s ease-out both;
  }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    .header, .stats-bar, .filters, .timeline-container {
      padding-left: 16px;
      padding-right: 16px;
    }

    .company-label {
      width: 120px;
      min-width: 120px;
    }

    .year-axis {
      margin-left: 120px;
    }
  }
</style>
</head>

// ===== COMPANY CONFIG =====
const COMPANIES = {
  'OpenAI':     { color: '#10b981', logo: 'O',  origin: 'us' },
  'Google':     { color: '#4285f4', logo: 'G',  origin: 'us' },
  'Anthropic':  { color: '#d97706', logo: 'A',  origin: 'us' },
  'Meta':       { color: '#3b82f6', logo: 'M',  origin: 'us' },
  'Mistral AI': { color: '#8b5cf6', logo: 'Mi', origin: 'eu' },
  'DeepSeek':   { color: '#06b6d4', logo: 'DS', origin: 'cn' },
  '阿里巴巴':   { color: '#f97316', logo: '阿', origin: 'cn' },
  '百度':       { color: '#3b82f6', logo: '百', origin: 'cn' },
  '字节跳动':   { color: '#14b8a6', logo: '字', origin: 'cn' },
  '智谱AI':     { color: '#ec4899', logo: '智', origin: 'cn' },
  '零一万物':   { color: '#a855f7', logo: '零', origin: 'cn' },
  '小米':       { color: '#f43f5e', logo: '米', origin: 'cn' },
  '月之暗面':   { color: '#6366f1', logo: '月', origin: 'cn' },
};

const ORIGIN_FLAGS = { us: '🇺🇸', cn: '🇨🇳', eu: '🇪🇺' };
const ORIGIN_LABELS = { us: '美国', cn: '中国', eu: '欧洲' };

// ===== STATE =====
let activeRegion = 'all';
let activeCompany = 'all';

// ===== INIT =====
function init() {
  computeTimeRange();
  renderStats();
  renderFilters();
  renderTimeline();
}

let YEAR_MIN, YEAR_MAX, TOTAL_MONTHS;

function computeTimeRange() {
  const dates = MODELS.map(m => {
    const [y, mo] = m.date.split('-').map(Number);
    return y * 12 + mo;
  });
  const minMonth = Math.min(...dates);
  const maxMonth = Math.max(...dates);
  YEAR_MIN = Math.floor(minMonth / 12);
  YEAR_MAX = Math.ceil(maxMonth / 12);
  TOTAL_MONTHS = (YEAR_MAX - YEAR_MIN) * 12 + 12;
}

function dateToPercent(dateStr) {
  const [y, m] = dateStr.split('-').map(Number);
  const monthOffset = (y - YEAR_MIN) * 12 + (m - 1);
  return (monthOffset / TOTAL_MONTHS) * 100;
}

function renderStats() {
  document.getElementById('statModels').textContent = MODELS.length;
  document.getElementById('statCompanies').textContent = Object.keys(COMPANIES).length;
  document.getElementById('statYears').textContent = YEAR_MAX - YEAR_MIN;
  document.getElementById('statChinese').textContent = MODELS.filter(m => m.origin === 'cn').length;
}

function renderFilters() {
  const regionDiv = document.getElementById('regionFilters');
  const companyDiv = document.getElementById('companyFilters');

  const regions = [
    { key: 'all', label: '全部' },
    { key: 'us', label: '🇺🇸 美国' },
    { key: 'cn', label: '🇨🇳 中国' },
    { key: 'eu', label: '🇪🇺 欧洲' },
  ];

  regions.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (r.key === 'all' ? ' active' : '');
    btn.textContent = r.label;
    btn.onclick = () => {
      activeRegion = r.key;
      document.querySelectorAll('#regionFilters .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTimeline();
    };
    regionDiv.appendChild(btn);
  });

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = '全部';
  allBtn.dataset.company = 'all';
  allBtn.onclick = () => {
    activeCompany = 'all';
    document.querySelectorAll('#companyFilters .filter-btn').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');
    renderTimeline();
  };
  companyDiv.appendChild(allBtn);

  Object.keys(COMPANIES).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = name;
    btn.dataset.company = name;
    btn.onclick = () => {
      activeCompany = name;
      document.querySelectorAll('#companyFilters .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTimeline();
    };
    companyDiv.appendChild(btn);
  });
}

function renderTimeline() {
  const yearAxis = document.getElementById('yearAxis');
  const body = document.getElementById('timelineBody');
  yearAxis.innerHTML = '';
  body.innerHTML = '';

  // Year axis
  const scrollWidth = Math.max(TOTAL_MONTHS / 12 * 120, 800);

  for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
    const label = document.createElement('div');
    label.className = 'year-label';
    label.textContent = y;
    const pct = ((y - YEAR_MIN) * 12 / TOTAL_MONTHS) * 100;
    label.style.left = pct + '%';
    label.style.width = (12 / TOTAL_MONTHS * 100) + '%';
    label.style.minWidth = '80px';
    yearAxis.appendChild(label);
  }

  yearAxis.style.minWidth = scrollWidth + 'px';

  // Filter models
  const filtered = MODELS.filter(m => {
    if (activeRegion !== 'all' && m.origin !== activeRegion) return false;
    if (activeCompany !== 'all' && m.company !== activeCompany) return false;
    return true;
  });

  // Group by company
  const companyOrder = Object.keys(COMPANIES);
  const grouped = {};
  companyOrder.forEach(c => grouped[c] = []);
  filtered.forEach(m => {
    if (grouped[m.company]) grouped[m.company].push(m);
  });

  let delay = 0;
  companyOrder.forEach(company => {
    const models = grouped[company];
    if (models.length === 0) return;

    const cfg = COMPANIES[company];
    const row = document.createElement('div');
    row.className = 'company-row';
    row.style.animationDelay = (delay * 0.05) + 's';
    delay++;

    const label = document.createElement('div');
    label.className = 'company-label';
    label.innerHTML = `
      <div class="company-logo" style="background: ${cfg.color}22; color: ${cfg.color}; border: 1px solid ${cfg.color}44;">${cfg.logo}</div>
      <div class="company-info">
        <div class="company-name">${ORIGIN_FLAGS[cfg.origin]} ${company}</div>
        <div class="company-origin">${ORIGIN_LABELS[cfg.origin]}</div>
      </div>
    `;
    row.appendChild(label);

    const track = document.createElement('div');
    track.className = 'model-track';
    track.style.minWidth = scrollWidth + 'px';

    for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
      const line = document.createElement('div');
      line.className = 'year-grid-line';
      line.style.left = ((y - YEAR_MIN) * 12 / TOTAL_MONTHS * 100) + '%';
      track.appendChild(line);
    }

    models.forEach((m, i) => {
      const node = document.createElement('div');
      node.className = 'model-node';
      node.style.left = dateToPercent(m.date) + '%';
      node.style.animationDelay = (delay * 0.03 + i * 0.05) + 's';

      const dot = document.createElement('div');
      dot.className = 'model-dot' + (m.flagship ? ' flagship' : '');
      dot.style.borderColor = m.flagship ? '#f472b6' : cfg.color;
      dot.style.background = (m.flagship ? 'rgba(244,114,182,0.2)' : cfg.color + '22');

      const nameLabel = document.createElement('div');
      nameLabel.className = 'model-name';
      nameLabel.textContent = m.name;

      const yearTag = document.createElement('div');
      yearTag.className = 'model-year-tag';
      const [y, mo] = m.date.split('-');
      yearTag.textContent = y + '.' + mo;

      node.appendChild(nameLabel);
      node.appendChild(dot);
      node.appendChild(yearTag);

      node.addEventListener('mouseenter', (e) => showTooltip(e, m, cfg));
      node.addEventListener('mousemove', (e) => moveTooltip(e));
      node.addEventListener('mouseleave', hideTooltip);

      track.appendChild(node);
    });

    row.appendChild(track);
    body.appendChild(row);
  });

  document.getElementById('timelineScroll').style.minWidth = scrollWidth + 'px';
}

// ===== TOOLTIP =====
const tooltip = document.getElementById('tooltip');

function showTooltip(e, model, cfg) {
  const badge = document.getElementById('tooltipBadge');
  const title = document.getElementById('tooltipTitle');
  const date = document.getElementById('tooltipDate');
  const desc = document.getElementById('tooltipDesc');
  const tags = document.getElementById('tooltipTags');

  badge.textContent = model.origin === 'cn' ? '🇨🇳' : model.origin === 'eu' ? '🇪🇺' : '🇺🇸';
  badge.style.background = cfg.color + '33';
  badge.style.color = cfg.color;
  title.textContent = model.name;

  const [y, m] = model.date.split('-');
  const monthNames = ['', '一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
  date.textContent = `${y}年${monthNames[parseInt(m)]} · ${model.company}${model.params ? ' · ' + model.params : ''}`;

  desc.textContent = model.desc;

  tags.innerHTML = model.tags.map(t => `<span class="tooltip-tag">${t}</span>`).join('');

  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const rect = tooltip.getBoundingClientRect();
  let x = e.clientX + 16;
  let y = e.clientY - 10;

  if (x + rect.width > window.innerWidth - 20) x = e.clientX - rect.width - 16;
  if (y + rect.height > window.innerHeight - 20) y = window.innerHeight - rect.height - 20;
  if (y < 10) y = 10;

  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// ===== START =====
init();
</script>
