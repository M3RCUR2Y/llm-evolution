<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大模型进化史 — LLM Evolution Timeline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #1a2235;
    --bg-hover: #243049;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border: #1e293b;
    --accent: #3b82f6;
    --glow: rgba(59, 130, 246, 0.3);
    --dim-opacity: 0.45;
  }

  body {
    font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ===== Header ===== */
  .header {
    padding: 40px 48px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, var(--bg-primary) 60%, transparent);
    backdrop-filter: blur(12px);
  }

  .header h1 {
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .header p {
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 300;
  }

  /* ===== Toolbar (search + view toggle) ===== */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 48px;
    flex-wrap: nowrap;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 400px;
    min-width: 200px;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--text-muted);
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    padding: 7px 80px 7px 36px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #searchInput::placeholder { color: var(--text-muted); }
  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  .search-count {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: var(--text-muted);
    pointer-events: none;
    font-variant-numeric: tabular-nums;
  }

  .view-toggle {
    display: flex;
    gap: 2px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px;
  }

  .view-btn {
    padding: 5px 12px;
    border: none;
    border-radius: 5px;
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .view-btn:hover { color: var(--text-primary); }
  .view-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .kbd-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .kbd-hint kbd {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg-secondary);
    font-size: 10px;
    font-family: inherit;
    margin: 0 1px;
  }

  /* ===== Stats Bar ===== */
  .stats-bar {
    display: flex;
    gap: 32px;
    padding: 14px 48px;
    border-bottom: 1px solid var(--border);
  }

  .stat { display: flex; flex-direction: column; }
  .stat-value { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

  /* ===== Filters ===== */
  .filters {
    display: flex;
    gap: 10px;
    padding: 12px 48px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-group.scrollable {
    flex-wrap: nowrap;
    overflow-x: auto;
    max-width: 600px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    padding-bottom: 4px;
  }
  .filter-group.scrollable::-webkit-scrollbar { height: 4px; }
  .filter-group.scrollable::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .filter-group.scrollable::-webkit-scrollbar-track { background: transparent; }

  .filter-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    align-self: center;
    margin-right: 8px;
  }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .filter-separator {
    width: 1px;
    height: 24px;
    background: var(--border);
    align-self: center;
    margin: 0 4px;
  }

  /* ===== Timeline Container ===== */
  .timeline-container {
    padding: 32px 48px 120px;
    overflow-x: auto;
    overflow-y: visible;
    position: relative;
  }

  .timeline-scroll {
    min-width: 100%;
    position: relative;
  }

  /* ===== Sparkline ===== */
  .sparkline-wrap {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 36px;
    z-index: 1;
    pointer-events: none;
    display: flex;
    align-items: flex-end;
    opacity: 0.6;
  }

  .sparkline-wrap canvas {
    width: 36px;
    height: 100%;
  }

  /* ===== Year Axis ===== */
  .year-axis {
    display: flex;
    position: relative;
    z-index: 10;
    margin-left: 140px;
    height: 40px;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
  }

  .year-label {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    padding-bottom: 8px;
    min-width: 80px;
    position: absolute;
    transition: opacity 0.3s;
  }

  .year-label.dim-era { opacity: var(--dim-opacity); }
  .year-label.bright-era { color: var(--text-primary); }

  .year-label::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 1px;
    height: 8px;
    background: var(--border);
  }

  /* ===== Year band overlays (visual rhythm) ===== */
  .year-bands {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 140px;
    right: 0;
    pointer-events: none;
    z-index: 0;
  }

  .year-band {
    position: absolute;
    top: 0;
    bottom: 0;
    transition: background 0.3s;
  }

  .year-band.dim { background: rgba(0,0,0,0.18); }
  .year-band.bright { background: rgba(59,130,246,0.03); }

  /* ===== Company Rows ===== */
  .company-row {
    display: flex;
    min-height: 80px;
    border-bottom: 1px solid rgba(30, 41, 59, 0.5);
    transition: background 0.3s;
    position: relative;
  }

  .company-row:hover { background: rgba(59, 130, 246, 0.03); }

  .company-label {
    width: 140px;
    min-width: 140px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    position: sticky;
    left: 0;
    z-index: 5;
    background: var(--bg-primary);
    border-right: 1px solid var(--border);
  }

  .company-logo {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .company-info { display: flex; flex-direction: column; min-width: 0; }

  .company-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .company-origin {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ===== Model Track ===== */
  .model-track {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    padding: 12px 0;
  }

  .year-grid-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(30, 41, 59, 0.4);
  }

  /* ===== Model Node ===== */
  .model-node {
    position: absolute;
    transform: translateX(-50%);
    cursor: pointer;
    z-index: 2;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .model-node:hover {
    z-index: 20;
    transform: translateX(-50%) scale(1.15);
  }

  .model-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid;
    position: relative;
    transition: all 0.3s;
  }

  .model-node:hover .model-dot { box-shadow: 0 0 20px var(--glow); }

  .model-dot.flagship { width: 14px; height: 14px; border-width: 3px; }

  .model-name {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-weight: 500;
    white-space: nowrap;
    color: var(--text-secondary);
    transition: color 0.2s;
    pointer-events: none;
  }

  .model-node:hover .model-name { color: var(--text-primary); font-weight: 600; }

  .model-year-tag {
    position: absolute;
    bottom: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: var(--text-muted);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .model-node:hover .model-year-tag { opacity: 1; }

  /* --- Search glow / dim --- */
  .model-node.search-dim {
    opacity: 0.15;
    filter: grayscale(0.6);
  }

  .model-node.search-match .model-dot {
    box-shadow: 0 0 16px 4px rgba(59,130,246,0.6), 0 0 40px rgba(59,130,246,0.3);
  }

  .model-node.search-match .model-name {
    color: #93c5fd;
    font-weight: 600;
  }

  /* --- Compare checkbox --- */
  .compare-check {
    position: absolute;
    top: -16px;
    right: -14px;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1.5px solid var(--text-muted);
    background: var(--bg-secondary);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s, border-color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .model-node:hover .compare-check { opacity: 1; }
  .compare-check.checked {
    opacity: 1;
    background: var(--accent);
    border-color: var(--accent);
  }

  .compare-check.checked::after {
    content: '✓';
    font-size: 10px;
    color: #fff;
    font-weight: 700;
  }

  /* ===== Evolution lines (SVG overlay) ===== */
  .evo-lines-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .evo-line {
    fill: none;
    stroke-width: 1.5;
    opacity: 0.08;
    transition: opacity 0.4s;
  }

  /* ===== Tooltip ===== */
  .tooltip {
    position: fixed;
    z-index: 1000;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    max-width: 360px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }

  .tooltip.visible { opacity: 1; transform: translateY(0); }

  .tooltip-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .tooltip-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; color: #fff; }
  .tooltip-title { font-size: 16px; font-weight: 700; }
  .tooltip-date { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .tooltip-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 10px; }
  .tooltip-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tooltip-tag { padding: 2px 8px; border-radius: 10px; font-size: 10px; background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.2); }

  .tooltip-meta {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .tooltip-meta-badge {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    border: 1px solid;
  }

  /* ===== Comparison Panel ===== */
  .compare-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 200;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    padding: 20px 48px;
  }

  .compare-panel.visible { transform: translateY(0); }

  .compare-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .compare-header h3 { font-size: 14px; font-weight: 600; }

  .compare-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.2s;
  }

  .compare-close:hover { background: var(--bg-hover); color: var(--text-primary); }

  .compare-grid {
    display: flex;
    gap: 20px;
    overflow-x: auto;
  }

  .compare-card {
    flex: 1;
    min-width: 220px;
    max-width: 320px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    position: relative;
  }

  .compare-card-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .compare-card-company { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
  .compare-card-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .compare-card-label { color: var(--text-muted); }
  .compare-card-value { color: var(--text-primary); font-weight: 500; }
  .compare-card-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.5; margin-top: 8px; }
  .compare-card-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 8px; }
  .compare-card-tag { padding: 1px 6px; border-radius: 8px; font-size: 9px; background: rgba(59,130,246,0.12); color: #93c5fd; }

  .compare-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .compare-remove:hover { background: rgba(239,68,68,0.2); color: #f87171; }

  /* ===== Table View ===== */
  .table-view {
    display: none;
    padding: 0 48px 120px;
  }

  .table-view.visible { display: block; }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .data-table th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 2px solid var(--border);
    color: var(--text-muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    transition: color 0.2s;
    position: sticky;
    top: 0;
    background: var(--bg-primary);
    z-index: 5;
  }

  .data-table th:hover { color: var(--text-primary); }
  .data-table th .sort-arrow { margin-left: 4px; font-size: 10px; }

  .data-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(30,41,59,0.3);
    vertical-align: middle;
  }

  .data-table tr { transition: background 0.2s; }
  .data-table tbody tr:hover { background: rgba(59,130,246,0.05); }

  .table-company-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .table-company-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .table-tag {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 8px;
    font-size: 10px;
    background: rgba(59,130,246,0.12);
    color: #93c5fd;
    margin: 1px 2px;
  }

  .table-source-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
  }

  .table-source-badge.open { background: rgba(16,185,129,0.15); color: #34d399; }
  .table-source-badge.closed { background: rgba(239,68,68,0.12); color: #f87171; }
  .table-source-badge.unknown { background: rgba(100,116,139,0.15); color: #94a3b8; }

  .table-modality-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 9px;
    background: rgba(168,85,247,0.12);
    color: #c4b5fd;
    margin: 1px;
  }

  .table-flagship-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #f472b6;
    margin-right: 4px;
    vertical-align: middle;
  }

  .table-row-dim { opacity: var(--dim-opacity); }

  /* ===== Legend ===== */
  .legend {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    padding: 10px 24px;
    background: rgba(17, 24, 39, 0.95);
    border: 1px solid var(--border);
    border-radius: 24px;
    backdrop-filter: blur(12px);
    z-index: 50;
    transition: bottom 0.3s;
  }

  .legend.shifted-up { bottom: 90px; }

  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 2px solid;
  }

  .legend-dot.flagship { width: 12px; height: 12px; border-width: 3px; }

  /* ===== Animations ===== */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .company-row { animation: fadeIn 0.5s ease-out both; }
  .model-node { animation: fadeIn 0.4s ease-out both; }

  /* ===== Footer ===== */
  .footer {
    padding: 20px 48px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .footer a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
  .footer a:hover { color: #93c5fd; text-decoration: underline; }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    .header, .stats-bar, .filters, .timeline-container, .toolbar, .table-view {
      padding-left: 16px;
      padding-right: 16px;
    }
    .company-label { width: 100px; min-width: 100px; }
    .year-axis { margin-left: 100px; }
    .year-bands { left: 100px; }
    .compare-panel { padding: 16px; }
    .kbd-hint { display: none; }
    .filter-group.scrollable { max-width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🧠 大模型进化史</h1>
  <p>LLM Evolution Timeline — 从 GPT-1 到多模态时代，国内外主流大模型的发展轨迹</p>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="搜索模型名称 / 公司 / 标签…" autocomplete="off" />
    <span class="search-count" id="searchCount"></span>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" data-view="timeline">🕐 时间线</button>
    <button class="view-btn" data-view="table">📋 表格</button>
  </div>
  <span class="kbd-hint"><kbd>/</kbd> 搜索 <kbd>Esc</kbd> 清除 <kbd>←</kbd><kbd>→</kbd> 滚动</span>
</div>

<div class="stats-bar" id="statsBar">

  </div>

    <div class="legend-dot" style="border-color: #60a5fa; background: rgba(96,165,250,0.2);"></div>
    <span>重要模型</span>
  </div>
  <div class="legend-item"><span style="color: #93c5fd;">🇺🇸</span><span>美国</span></div>
  <div class="legend-item"><span style="color: #f87171;">🇨🇳</span><span>中国</span></div>
  <div class="legend-item"><span>🇪🇺</span><span>欧洲</span></div>

<script>
// ===== DATA =====
let MODELS = [];
let COMPANIES = {};

const ORIGIN_FLAGS = { us: '🇺🇸', cn: '🇨🇳', eu: '🇪🇺' };
const ORIGIN_LABELS = { us: '美国', cn: '中国', eu: '欧洲' };

// ===== STATE =====
let activeRegion = 'all';
let activeCompany = 'all';
let activeSource = 'all';   // all | open | closed
let activeModality = 'all'; // all | text | multimodal
let searchQuery = '';
let viewMode = 'timeline';  // timeline | table
let compareIds = [];         // max 3
let sortCol = 'date';
let sortDir = 1; // 1 = asc, -1 = desc

let YEAR_MIN, YEAR_MAX, TOTAL_MONTHS;

// ===== INIT =====
async function init() {
  try {
    const [modelsRes, companiesRes] = await Promise.all([
      fetch('data/models.json'),
      fetch('data/companies.json')
    ]);
    if (!modelsRes.ok) throw new Error(`models.json: ${modelsRes.status}`);
    if (!companiesRes.ok) throw new Error(`companies.json: ${companiesRes.status}`);
    MODELS = await modelsRes.json();
    COMPANIES = await companiesRes.json();
  } catch (err) {
    console.warn('Failed to load data files…', err);
    document.getElementById('footerUpdated').textContent = '⚠️ 数据加载失败，请刷新重试';
    return;
  }

  readHashState();
  computeTimeRange();
  renderStats();
  renderFilters();
  renderTimeline();
  renderTable();
  updateFooter();
  bindEvents();
}

// ===== TIME RANGE =====
function computeTimeRange() {
  const dates = MODELS.map(m => { const [y,mo] = m.date.split('-').map(Number); return y*12+mo; });
  const minMonth = Math.min(...dates);
  const maxMonth = Math.max(...dates);
  YEAR_MIN = Math.floor(minMonth / 12);
  YEAR_MAX = Math.ceil(maxMonth / 12);
  TOTAL_MONTHS = (YEAR_MAX - YEAR_MIN) * 12 + 12;
}

function dateToPercent(dateStr) {
  const [y,m] = dateStr.split('-').map(Number);
  return ((y - YEAR_MIN) * 12 + (m - 1)) / TOTAL_MONTHS * 100;
}

// ===== FILTERING =====
function getFilteredModels() {
  return MODELS.filter(m => {
    if (activeRegion !== 'all' && m.origin !== activeRegion) return false;
    if (activeCompany !== 'all' && m.company !== activeCompany) return false;
    if (activeSource === 'open' && m.open_source !== true) return false;
    if (activeSource === 'closed' && m.open_source !== false) return false;
    if (activeModality === 'text' && !(m.modalities && m.modalities.length === 1 && m.modalities[0] === 'text')) return false;
    if (activeModality === 'multimodal' && !(m.modalities && m.modalities.length > 1)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const hay = [m.name, m.company, m.desc, ...(m.tags || [])].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function getSearchMatchIds() {
  if (!searchQuery) return null;
  const q = searchQuery.toLowerCase();
  return new Set(MODELS.filter(m => {
    const hay = [m.name, m.company, m.desc, ...(m.tags || [])].join(' ').toLowerCase();
    return hay.includes(q);
  }).map(m => m.id));
}

// ===== STATS =====
function renderStats() {
  const filtered = getFilteredModels();
  document.getElementById('statModels').textContent = filtered.length;
  document.getElementById('statCompanies').textContent = new Set(filtered.map(m=>m.company)).size;
  document.getElementById('statYears').textContent = YEAR_MAX - YEAR_MIN;
  document.getElementById('statChinese').textContent = filtered.filter(m=>m.origin==='cn').length;
}

// ===== FILTERS =====
function renderFilters() {
  // Region
  const regionDiv = document.getElementById('regionFilters');
  regionDiv.innerHTML = '';
  [{key:'all',label:'全部'},{key:'us',label:'🇺🇸 美国'},{key:'cn',label:'🇨🇳 中国'},{key:'eu',label:'🇪🇺 欧洲'}].forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (r.key === activeRegion ? ' active' : '');
    btn.textContent = r.label;
    btn.onclick = () => { activeRegion = r.key; updateFilters(); };
    regionDiv.appendChild(btn);
  });

  // Company
  const companyDiv = document.getElementById('companyFilters');
  companyDiv.innerHTML = '';
  const allCBtn = document.createElement('button');
  allCBtn.className = 'filter-btn' + (activeCompany==='all'?' active':'');
  allCBtn.textContent = '全部';
  allCBtn.dataset.company = 'all';
  allCBtn.onclick = () => { activeCompany='all'; updateFilters(); };
  companyDiv.appendChild(allCBtn);
  Object.keys(COMPANIES).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeCompany===name?' active':'');
    btn.textContent = name;
    btn.dataset.company = name;
    btn.onclick = () => { activeCompany = name; updateFilters(); };
    companyDiv.appendChild(btn);
  });

  // Source (open/closed)
  const sourceDiv = document.getElementById('sourceFilters');
  sourceDiv.innerHTML = '';
  [{key:'all',label:'全部'},{key:'open',label:'🔓 开源'},{key:'closed',label:'🔒 闭源'}].forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (s.key===activeSource?' active':'');
    btn.textContent = s.label;
    btn.onclick = () => { activeSource = s.key; updateFilters(); };
    sourceDiv.appendChild(btn);
  });

  // Modality
  const modDiv = document.getElementById('modalityFilters');
  modDiv.innerHTML = '';
  [{key:'all',label:'全部'},{key:'text',label:'📝 纯文本'},{key:'multimodal',label:'🎨 多模态'}].forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (s.key===activeModality?' active':'');
    btn.textContent = s.label;
    btn.onclick = () => { activeModality = s.key; updateFilters(); };
    modDiv.appendChild(btn);
  });
}

function updateFilters() {
  // Re-highlight buttons
  document.querySelectorAll('#regionFilters .filter-btn').forEach(b => {
    const key = b.textContent.includes('全部') ? 'all' : b.textContent.includes('美') ? 'us' : b.textContent.includes('中') ? 'cn' : 'eu';
    b.classList.toggle('active', key === activeRegion);
  });
  document.querySelectorAll('#companyFilters .filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.company === activeCompany);
  });
  document.querySelectorAll('#sourceFilters .filter-btn').forEach(b => {
    const t = b.textContent;
    const key = t.includes('全部') ? 'all' : t.includes('开') ? 'open' : 'closed';
    b.classList.toggle('active', key === activeSource);
  });
  document.querySelectorAll('#modalityFilters .filter-btn').forEach(b => {
    const t = b.textContent;
    const key = t.includes('全部') ? 'all' : t.includes('纯') ? 'text' : 'multimodal';
    b.classList.toggle('active', key === activeModality);
  });
  updateHash();
  renderStats();
  renderTimeline();
  renderTable();
  updateSearchCount();
}

// ===== SEARCH =====
function updateSearchCount() {
  const countEl = document.getElementById('searchCount');
  if (!searchQuery) { countEl.textContent = ''; return; }
  const matchIds = getSearchMatchIds();
  const filtered = getFilteredModels();
  const matchCount = filtered.filter(m => matchIds.has(m.id)).length;
  countEl.textContent = `${matchCount} / ${MODELS.length}`;
}

// ===== TIMELINE RENDER =====
function renderTimeline() {
  const yearAxis = document.getElementById('yearAxis');
  const body = document.getElementById('timelineBody');
  const bandsDiv = document.getElementById('yearBands');
  yearAxis.innerHTML = '';
  body.innerHTML = '';
  bandsDiv.innerHTML = '';

  const scrollWidth = Math.max(TOTAL_MONTHS / 12 * 120, 800);

  // Year axis + bands
  for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
    const label = document.createElement('div');
    label.className = 'year-label';
    const isDim = y < 2023;
    if (isDim) label.classList.add('dim-era');
    else label.classList.add('bright-era');
    label.textContent = y;
    const pct = ((y - YEAR_MIN) * 12 / TOTAL_MONTHS) * 100;
    label.style.left = pct + '%';
    label.style.width = (12 / TOTAL_MONTHS * 100) + '%';
    label.style.minWidth = '80px';
    yearAxis.appendChild(label);

    // Year band
    const band = document.createElement('div');
    band.className = 'year-band ' + (isDim ? 'dim' : 'bright');
    band.style.left = pct + '%';
    band.style.width = (12 / TOTAL_MONTHS * 100) + '%';
    bandsDiv.appendChild(band);
  }

  yearAxis.style.minWidth = scrollWidth + 'px';
  bandsDiv.style.minWidth = scrollWidth + 'px';

  // Filter + group
  const filtered = getFilteredModels();
  const matchIds = getSearchMatchIds();
  const companyOrder = Object.keys(COMPANIES);
  const grouped = {};
  companyOrder.forEach(c => grouped[c] = []);
  filtered.forEach(m => { if (grouped[m.company]) grouped[m.company].push(m); });

  let delay = 0;
  companyOrder.forEach(company => {
    const models = grouped[company];
    if (models.length === 0) return;
    const cfg = COMPANIES[company];

    const row = document.createElement('div');
    row.className = 'company-row';
    row.style.animationDelay = (delay * 0.05) + 's';
    row.dataset.company = company;
    delay++;

    const label = document.createElement('div');
    label.className = 'company-label';
    label.innerHTML = `
      <div class="company-logo" style="background:${cfg.color}22;color:${cfg.color};border:1px solid ${cfg.color}44;">${cfg.logo}</div>
      <div class="company-info">
        <div class="company-name">${ORIGIN_FLAGS[cfg.origin]} ${company}</div>
        <div class="company-origin">${ORIGIN_LABELS[cfg.origin]}</div>
      </div>`;
    row.appendChild(label);

    const track = document.createElement('div');
    track.className = 'model-track';
    track.style.minWidth = scrollWidth + 'px';
    track.dataset.company = company;

    for (let y = YEAR_MIN; y <= YEAR_MAX; y++) {
      const line = document.createElement('div');
      line.className = 'year-grid-line';
      line.style.left = ((y - YEAR_MIN) * 12 / TOTAL_MONTHS * 100) + '%';
      track.appendChild(line);
    }

    // Compute overlap offsets: group by same month
    const monthGroups = {};
    models.forEach(m => {
      const key = m.date;
      if (!monthGroups[key]) monthGroups[key] = [];
      monthGroups[key].push(m);
    });

    const offsetMap = {};
    Object.values(monthGroups).forEach(group => {
      if (group.length > 1) {
        group.forEach((m, i) => {
          offsetMap[m.id] = (i - (group.length - 1) / 2) * 20;
        });
      }
    });

    models.forEach((m, i) => {
      const node = document.createElement('div');
      node.className = 'model-node';
      node.style.left = dateToPercent(m.date) + '%';
      node.style.animationDelay = (delay * 0.03 + i * 0.05) + 's';
      node.dataset.id = m.id;

      // Vertical offset for overlap
      const vOff = offsetMap[m.id] || 0;
      if (vOff !== 0) node.style.top = `calc(50% + ${vOff}px)`;
      else node.style.top = '50%';
      node.style.transform = 'translate(-50%, -50%)';

      // Search highlight
      if (searchQuery && matchIds) {
        if (matchIds.has(m.id)) node.classList.add('search-match');
        else node.classList.add('search-dim');
      }

      const dot = document.createElement('div');
      dot.className = 'model-dot' + (m.flagship ? ' flagship' : '');
      dot.style.borderColor = m.flagship ? '#f472b6' : cfg.color;
      dot.style.background = m.flagship ? 'rgba(244,114,182,0.2)' : cfg.color + '22';

      const nameLabel = document.createElement('div');
      nameLabel.className = 'model-name';
      nameLabel.textContent = m.name;

      const yearTag = document.createElement('div');
      yearTag.className = 'model-year-tag';
      const [y, mo] = m.date.split('-');
      yearTag.textContent = y + '.' + mo;

      // Compare checkbox
      const check = document.createElement('div');
      check.className = 'compare-check' + (compareIds.includes(m.id) ? ' checked' : '');
      check.onclick = (e) => { e.stopPropagation(); toggleCompare(m.id); };

      node.appendChild(nameLabel);
      node.appendChild(dot);
      node.appendChild(yearTag);
      node.appendChild(check);

      node.addEventListener('mouseenter', (e) => showTooltip(e, m, cfg));
      node.addEventListener('mousemove', (e) => moveTooltip(e));
      node.addEventListener('mouseleave', hideTooltip);

      track.appendChild(node);
    });

    row.appendChild(track);

    // Hover to reveal evolution lines for this company
    row.addEventListener('mouseenter', () => {
      document.querySelectorAll(`.evo-line[data-company="${company}"]`).forEach(p => {
        p.style.opacity = '0.35';
        p.style.strokeWidth = '2';
      });
    });
    row.addEventListener('mouseleave', () => {
      document.querySelectorAll(`.evo-line[data-company="${company}"]`).forEach(p => {
        p.style.opacity = '';
        p.style.strokeWidth = '';
      });
    });

    body.appendChild(row);
  });

  document.getElementById('timelineScroll').style.minWidth = scrollWidth + 'px';

  drawEvolutionLines();
  drawSparkline();
}

// ===== EVOLUTION LINES =====
function drawEvolutionLines() {
  const svg = document.getElementById('evoLinesSvg');
  svg.innerHTML = '';

  const filtered = getFilteredModels();
  const companyOrder = Object.keys(COMPANIES);
  const grouped = {};
  companyOrder.forEach(c => grouped[c] = []);
  filtered.forEach(m => { if (grouped[m.company]) grouped[m.company].push(m); });

  const container = document.getElementById('timelineScroll');
  const containerRect = container.getBoundingClientRect();
  const scrollLeft = document.getElementById('timelineView').scrollLeft;

  companyOrder.forEach(company => {
    const models = grouped[company].sort((a,b) => a.date.localeCompare(b.date));
    if (models.length < 2) return;
    const cfg = COMPANIES[company];

    const track = document.querySelector(`.model-track[data-company="${company}"]`);
    if (!track) return;
    const trackRect = track.getBoundingClientRect();

    for (let i = 0; i < models.length - 1; i++) {
      const nodeA = track.querySelector(`.model-node[data-id="${models[i].id}"]`);
      const nodeB = track.querySelector(`.model-node[data-id="${models[i+1].id}"]`);
      if (!nodeA || !nodeB) continue;

      const rectA = nodeA.getBoundingClientRect();
      const rectB = nodeB.getBoundingClientRect();

      const x1 = rectA.left + rectA.width/2 - containerRect.left + scrollLeft;
      const y1 = rectA.top + rectA.height/2 - containerRect.top;
      const x2 = rectB.left + rectB.width/2 - containerRect.left + scrollLeft;
      const y2 = rectB.top + rectB.height/2 - containerRect.top;

      const cpx = (x1 + x2) / 2;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M ${x1} ${y1} C ${cpx} ${y1}, ${cpx} ${y2}, ${x2} ${y2}`);
      path.setAttribute('class', 'evo-line');
      path.setAttribute('stroke', cfg.color);
      path.dataset.company = company;
      svg.appendChild(path);
    }
  });

  svg.style.width = container.scrollWidth + 'px';
  svg.style.height = container.scrollHeight + 'px';
}

// ===== SPARKLINE =====
function drawSparkline() {
  const canvas = document.getElementById('sparklineCanvas');
  const container = document.getElementById('timelineScroll');
  canvas.width = 36;
  canvas.height = container.scrollHeight;
  const ctx = canvas.getContext('2d');

  const filtered = getFilteredModels();
  // Cumulative count by month
  const monthCounts = {};
  filtered.forEach(m => {
    const [y, mo] = m.date.split('-').map(Number);
    const key = y * 12 + mo;
    monthCounts[key] = (monthCounts[key] || 0) + 1;
  });

  const minM = YEAR_MIN * 12 + 1;
  const maxM = YEAR_MAX * 12 + 12;
  let cum = 0;
  const points = [];
  for (let m = minM; m <= maxM; m++) {
    cum += (monthCounts[m] || 0);
    points.push({ month: m, count: cum });
  }

  if (points.length === 0 || cum === 0) return;

  const maxCount = cum;
  const h = canvas.height;
  const w = canvas.width;
  const pad = 8;

  ctx.clearRect(0, 0, w, h);

  // Draw filled area
  ctx.beginPath();
  ctx.moveTo(pad, h - pad);
  points.forEach((p, i) => {
    const x = pad + (i / (points.length - 1)) * (w - pad * 2);
    const y = h - pad - (p.count / maxCount) * (h - pad * 2);
    ctx.lineTo(x, y);
  });
  ctx.lineTo(w - pad, h - pad);
  ctx.closePath();
  ctx.fillStyle = 'rgba(59,130,246,0.08)';
  ctx.fill();

  // Draw line
  ctx.beginPath();
  points.forEach((p, i) => {
    const x = pad + (i / (points.length - 1)) * (w - pad * 2);
    const y = h - pad - (p.count / maxCount) * (h - pad * 2);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = 'rgba(59,130,246,0.35)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Label
  ctx.fillStyle = 'rgba(59,130,246,0.5)';
  ctx.font = '9px Inter, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(maxCount + '', pad + 2, pad + 10);
}

// ===== TABLE VIEW =====
function renderTable() {
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');
  head.innerHTML = '';
  body.innerHTML = '';

  const cols = [
    { key: 'flagship', label: '⭐', width: '40px' },
    { key: 'name', label: '模型名称' },
    { key: 'company', label: '公司' },
    { key: 'date', label: '发布时间' },
    { key: 'params', label: '参数量' },
    { key: 'open_source', label: '类型' },
    { key: 'modalities', label: '模态' },
    { key: 'tags', label: '标签' },
  ];

  cols.forEach(col => {
    const th = document.createElement('th');
    th.innerHTML = col.label;
    if (col.key !== 'flagship') {
      th.innerHTML += `<span class="sort-arrow">${sortCol === col.key ? (sortDir === 1 ? '↑' : '↓') : ''}</span>`;
      th.onclick = () => {
        if (sortCol === col.key) sortDir *= -1;
        else { sortCol = col.key; sortDir = 1; }
        renderTable();
      };
    }
    if (col.width) th.style.width = col.width;
    head.appendChild(th);
  });

  const filtered = getFilteredModels();
  const matchIds = getSearchMatchIds();

  const sorted = [...filtered].sort((a, b) => {
    let va, vb;
    switch (sortCol) {
      case 'name': va = a.name; vb = b.name; break;
      case 'company': va = a.company; vb = b.company; break;
      case 'date': va = a.date; vb = b.date; break;
      case 'params': va = a.params || ''; vb = b.params || ''; break;
      case 'open_source': va = a.open_source === true ? 0 : a.open_source === false ? 1 : 2; vb = b.open_source === true ? 0 : b.open_source === false ? 1 : 2; break;
      case 'modalities': va = (a.modalities||[]).length; vb = (b.modalities||[]).length; break;
      case 'tags': va = (a.tags||[]).join(','); vb = (b.tags||[]).join(','); break;
      default: va = a.date; vb = b.date;
    }
    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return (va - vb) * sortDir;
  });

  sorted.forEach(m => {
    const cfg = COMPANIES[m.company] || { color: '#64748b' };
    const tr = document.createElement('tr');

    // Dim old era
    const [yr] = m.date.split('-').map(Number);
    if (yr < 2023) tr.classList.add('table-row-dim');

    // Search dim
    if (searchQuery && matchIds && !matchIds.has(m.id)) tr.style.opacity = '0.25';

    // Flagship
    const tdFlag = document.createElement('td');
    if (m.flagship) tdFlag.innerHTML = '<span class="table-flagship-dot"></span>';
    tr.appendChild(tdFlag);

    // Name
    const tdName = document.createElement('td');
    tdName.textContent = m.name;
    tdName.style.fontWeight = m.flagship ? '700' : '400';
    tr.appendChild(tdName);

    // Company
    const tdCompany = document.createElement('td');
    tdCompany.innerHTML = `<span class="table-company-badge"><span class="table-company-dot" style="background:${cfg.color}"></span>${m.company}</span>`;
    tr.appendChild(tdCompany);

    // Date
    const tdDate = document.createElement('td');
    tdDate.textContent = m.date;
    tdDate.style.fontVariantNumeric = 'tabular-nums';
    tr.appendChild(tdDate);

    // Params
    const tdParams = document.createElement('td');
    tdParams.textContent = m.params || '—';
    tr.appendChild(tdParams);

    // Source
    const tdSource = document.createElement('td');
    if (m.open_source === true) tdSource.innerHTML = '<span class="table-source-badge open">开源</span>';
    else if (m.open_source === false) tdSource.innerHTML = '<span class="table-source-badge closed">闭源</span>';
    else tdSource.innerHTML = '<span class="table-source-badge unknown">未知</span>';
    tr.appendChild(tdSource);

    // Modalities
    const tdMod = document.createElement('td');
    tdMod.innerHTML = (m.modalities || ['text']).map(mod => {
      const labels = { text: '文本', image: '图像', audio: '音频' };
      return `<span class="table-modality-badge">${labels[mod] || mod}</span>`;
    }).join('');
    tr.appendChild(tdMod);

    // Tags
    const tdTags = document.createElement('td');
    tdTags.innerHTML = (m.tags || []).map(t => `<span class="table-tag">${t}</span>`).join('');
    tr.appendChild(tdTags);

    body.appendChild(tr);
  });
}

// ===== COMPARE =====
function toggleCompare(id) {
  const idx = compareIds.indexOf(id);
  if (idx >= 0) {
    compareIds.splice(idx, 1);
  } else {
    if (compareIds.length >= 3) {
      compareIds.shift(); // remove oldest
    }
    compareIds.push(id);
  }
  updateComparePanel();
  // Update checkboxes in timeline
  document.querySelectorAll('.compare-check').forEach(el => {
    const node = el.closest('.model-node');
    if (node) {
      el.classList.toggle('checked', compareIds.includes(node.dataset.id));
    }
  });
}

function updateComparePanel() {
  const panel = document.getElementById('comparePanel');
  const grid = document.getElementById('compareGrid');
  const countEl = document.getElementById('compareCount');
  const legend = document.getElementById('legend');

  if (compareIds.length === 0) {
    panel.classList.remove('visible');
    legend.classList.remove('shifted-up');
    return;
  }

  panel.classList.add('visible');
  legend.classList.add('shifted-up');
  countEl.textContent = `(${compareIds.length}/3)`;

  grid.innerHTML = '';
  compareIds.forEach(id => {
    const m = MODELS.find(x => x.id === id);
    if (!m) return;
    const cfg = COMPANIES[m.company] || {};

    const card = document.createElement('div');
    card.className = 'compare-card';
    card.innerHTML = `
      <button class="compare-remove" data-id="${m.id}" title="移除">✕</button>
      <div class="compare-card-name">${m.flagship ? '<span class="table-flagship-dot"></span>' : ''}${m.name}</div>
      <div class="compare-card-company">${ORIGIN_FLAGS[m.origin] || ''} ${m.company}</div>
      <div class="compare-card-row"><span class="compare-card-label">发布时间</span><span class="compare-card-value">${m.date}</span></div>
      <div class="compare-card-row"><span class="compare-card-label">参数量</span><span class="compare-card-value">${m.params || '未公开'}</span></div>
      <div class="compare-card-row"><span class="compare-card-label">类型</span><span class="compare-card-value">${m.open_source === true ? '🔓 开源' : m.open_source === false ? '🔒 闭源' : '未知'}</span></div>
      <div class="compare-card-row"><span class="compare-card-label">模态</span><span class="compare-card-value">${(m.modalities||['text']).map(mod=>({text:'文本',image:'图像',audio:'音频'}[mod]||mod)).join(', ')}</span></div>
      <div class="compare-card-desc">${m.desc}</div>
      <div class="compare-card-tags">${(m.tags||[]).map(t=>`<span class="compare-card-tag">${t}</span>`).join('')}</div>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll('.compare-remove').forEach(btn => {
    btn.onclick = () => toggleCompare(btn.dataset.id);
  });
}

// ===== TOOLTIP =====
const tooltip = document.getElementById('tooltip');

function showTooltip(e, model, cfg) {
  document.getElementById('tooltipBadge').textContent = model.origin === 'cn' ? '🇨🇳' : model.origin === 'eu' ? '🇪🇺' : '🇺🇸';
  document.getElementById('tooltipBadge').style.background = cfg.color + '33';
  document.getElementById('tooltipBadge').style.color = cfg.color;
  document.getElementById('tooltipTitle').textContent = model.name;

  const [y, m] = model.date.split('-');
  const monthNames = ['','一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('tooltipDate').textContent = `${y}年${monthNames[parseInt(m)]} · ${model.company}${model.params ? ' · ' + model.params : ''}`;

  // Meta badges (open_source + modalities)
  const metaDiv = document.getElementById('tooltipMeta');
  let metaHtml = '';
  if (model.open_source === true) metaHtml += '<span class="tooltip-meta-badge" style="border-color:#34d399;color:#34d399;background:rgba(52,211,153,0.1);">🔓 开源</span>';
  else if (model.open_source === false) metaHtml += '<span class="tooltip-meta-badge" style="border-color:#f87171;color:#f87171;background:rgba(248,113,113,0.1);">🔒 闭源</span>';
  (model.modalities || ['text']).forEach(mod => {
    const labels = {text:'📝 文本',image:'🖼️ 图像',audio:'🎵 音频'};
    metaHtml += `<span class="tooltip-meta-badge" style="border-color:#a78bfa;color:#c4b5fd;background:rgba(167,139,250,0.1);">${labels[mod]||mod}</span>`;
  });
  metaDiv.innerHTML = metaHtml;

  document.getElementById('tooltipDesc').textContent = model.desc;
  document.getElementById('tooltipTags').innerHTML = (model.tags||[]).map(t=>`<span class="tooltip-tag">${t}</span>`).join('');

  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const rect = tooltip.getBoundingClientRect();
  let x = e.clientX + 16, y = e.clientY - 10;
  if (x + rect.width > window.innerWidth - 20) x = e.clientX - rect.width - 16;
  if (y + rect.height > window.innerHeight - 20) y = window.innerHeight - rect.height - 20;
  if (y < 10) y = 10;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() { tooltip.classList.remove('visible'); }

// ===== VIEW TOGGLE =====
function setView(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === mode));
  document.getElementById('timelineView').style.display = mode === 'timeline' ? '' : 'none';
  const tableView = document.getElementById('tableView');
  if (mode === 'table') { tableView.classList.add('visible'); tableView.style.display = ''; }
  else { tableView.classList.remove('visible'); tableView.style.display = 'none'; }
  document.getElementById('legend').style.display = mode === 'timeline' ? '' : 'none';
}

// ===== HASH =====
function updateHash() {
  const params = [];
  if (activeRegion !== 'all') params.push(`region=${activeRegion}`);
  if (activeCompany !== 'all') params.push(`company=${encodeURIComponent(activeCompany)}`);
  if (activeSource !== 'all') params.push(`source=${activeSource}`);
  if (activeModality !== 'all') params.push(`modality=${activeModality}`);
  const hash = params.length > 0 ? '#' + params.join('&') : '';
  if (window.location.hash !== hash) history.replaceState(null, '', hash || window.location.pathname);
}

function readHashState() {
  const hash = window.location.hash.replace('#','');
  if (!hash) return;
  hash.split('&').forEach(pair => {
    const [key, val] = pair.split('=');
    if (key === 'region') activeRegion = val;
    if (key === 'company') activeCompany = decodeURIComponent(val);
    if (key === 'source') activeSource = val;
    if (key === 'modality') activeModality = val;
  });
}

// ===== FOOTER =====
function updateFooter() {
  const lastCommit = '2026-06-07';
  document.getElementById('footerUpdated').textContent = `最后更新：${lastCommit}`;
}

// ===== EVENTS =====
function bindEvents() {
  // Search
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value.trim();
    renderStats();
    renderTimeline();
    renderTable();
    updateSearchCount();
  });

  // View toggle
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.onclick = () => setView(btn.dataset.view);
  });

  // Compare close
  document.getElementById('compareClose').onclick = () => {
    compareIds = [];
    updateComparePanel();
    document.querySelectorAll('.compare-check.checked').forEach(el => el.classList.remove('checked'));
  };

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    // / focuses search
    if (e.key === '/' && document.activeElement !== searchInput) {
      e.preventDefault();
      searchInput.focus();
      return;
    }

    // Esc clears search or closes compare
    if (e.key === 'Escape') {
      if (compareIds.length > 0) {
        compareIds = [];
        updateComparePanel();
        document.querySelectorAll('.compare-check.checked').forEach(el => el.classList.remove('checked'));
      } else if (searchQuery) {
        searchInput.value = '';
        searchQuery = '';
        searchInput.blur();
        renderStats();
        renderTimeline();
        renderTable();
        updateSearchCount();
      }
      return;
    }

    // Arrow keys scroll timeline
    if (document.activeElement === searchInput) return;
    const container = document.getElementById('timelineView');
    if (e.key === 'ArrowLeft') { container.scrollBy({ left: -200, behavior: 'smooth' }); e.preventDefault(); }
    if (e.key === 'ArrowRight') { container.scrollBy({ left: 200, behavior: 'smooth' }); e.preventDefault(); }
  });

  // Redraw evolution lines on scroll/resize
  const timelineView = document.getElementById('timelineView');
  let evoTimeout;
  const redrawEvo = () => {
    clearTimeout(evoTimeout);
    evoTimeout = setTimeout(() => { drawEvolutionLines(); drawSparkline(); }, 100);
  };
  timelineView.addEventListener('scroll', redrawEvo);
  window.addEventListener('resize', redrawEvo);

  // Hash change
  window.addEventListener('hashchange', () => {
    readHashState();
    updateFilters();
  });
}

// ===== START =====
init();
</script>
